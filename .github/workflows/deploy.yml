name: Deploy

# Runs ONLY on push to main and only after CI has passed. Splits the deploy
# into two discrete steps so a broken rule file can never ship alongside a
# good hosting build.
#
# IMPORTANT: there is NO `--force` flag anywhere in this file. The 84
# composite indexes live in Firebase console and must never be wiped by a
# mis-typed deploy. Index changes are intentionally deployed manually by an
# operator after a "firebase firestore:indexes" diff review.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

# `FirebaseExtended/action-hosting-deploy@v0` is still shipped as a Node.js 20
# action (no Node 24 tag has been published yet). GitHub's runners will reject
# Node 20 actions starting 2026-06-02, so we opt into the Node 24 shim now —
# the official workaround published in the deprecation notice.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Firebase deploy (rules + hosting)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Vite inlines VITE_* env vars into the built bundle at compile time, so
      # the runner must have the Firebase web config present BEFORE `npm run
      # build` runs. These keys are public identifiers (protected by Firestore
      # rules + App Check), but we still store them as GitHub secrets so they
      # never live in the repo.
      - name: Build production bundle
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      # ─── Rules only ─────────────────────────────────────────────────────
      # Rule changes compile on deploy; if the file is invalid the CLI
      # exits non-zero here and hosting below is skipped.
      - name: Deploy Firestore rules
        uses: w9jds/firebase-action@v14.0.0
        with:
          args: deploy --only firestore:rules --project event-app-880a3
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EVENT_APP }}

      # ─── Hosting only ───────────────────────────────────────────────────
      - name: Deploy to Firebase Hosting (live channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EVENT_APP }}
          projectId: event-app-880a3
          channelId: live
